  <path d="M131 258 Q155 250 178 255" stroke="#8b5e3c" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M222 255 Q245 250 268 258" stroke="#8b5e3c" stroke-width="2.5" fill="none" stroke-linecap="round"/>

