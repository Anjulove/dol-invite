  <ellipse cx="200" cy="470" rx="170" ry="60" fill="#d8b8f0"/>
  <ellipse cx="140" cy="448" rx="70"  ry="38" fill="#e8d0f8"/>
  <ellipse cx="260" cy="448" rx="70"  ry="38" fill="#e8d0f8"/>
  <ellipse cx="200" cy="438" rx="90"  ry="42" fill="#f0e8fc"/>
