  <path d="M216 278 Q244 262 272 278" stroke="#8b5e3c" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M221 276 Q219 270 216 267" stroke="#8b5e3c" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M236 271 Q235 265 234 261" stroke="#8b5e3c" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M251 269 Q251 263 251 259" stroke="#8b5e3c" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M267 272 Q268 266 270 262" stroke="#8b5e3c" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M218 278 Q244 286 270 278" stroke="#8b5e3c" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.4"/>

