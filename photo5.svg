  <ellipse cx="200" cy="358" rx="10" ry="6" fill="#f09090" opacity="0.2"/>

  <!-- zzz -->
  <text x="310" y="220" font-size="22" fill="white" opacity="0.6" font-family="sans-serif" font-weight="bold">z</text>
  <text x="330" y="200" font-size="18" fill="white" opacity="0.45" font-family="sans-serif" font-weight="bold">z</text>
  <text x="348" y="183" font-size="14" fill="white" opacity="0.3" font-family="sans-serif" font-weight="bold">z</text>

  <text x="200" y="492" text-anchor="middle" font-family="serif" font-size="14" fill="#e0c8f8" opacity="0.9">🌙 달콤한 꿈 꿔요 🌙</text>
</svg>
