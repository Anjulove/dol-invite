<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#edfcf4"/><stop offset="100%" stop-color="#b8edcc"/>
    </linearGradient>
    <radialGradient id="sk" cx="45%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#fde8c8"/><stop offset="100%" stop-color="#f0c09a"/>
    </radialGradient>
    <radialGradient id="bl" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f9a0a0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f9a0a0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ey" cx="60%" cy="35%" r="60%">
