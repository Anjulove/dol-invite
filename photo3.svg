  <ellipse cx="156" cy="210" rx="27" ry="25" fill="white"/>
  <ellipse cx="157" cy="212" rx="19" ry="20" fill="url(#ey)"/>
  <ellipse cx="157" cy="212" rx="12" ry="13" fill="#2a1510"/>
  <circle  cx="167" cy="204" r="7"  fill="white"/>
  <circle  cx="151" cy="216" r="3"  fill="white" opacity="0.5"/>
  <path d="M131 200 Q156 188 182 200" stroke="#8b5e3c" stroke-width="2.5" fill="none" stroke-linecap="round"/>

