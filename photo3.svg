  <ellipse cx="244" cy="210" rx="27" ry="25" fill="white"/>
  <ellipse cx="245" cy="212" rx="19" ry="20" fill="url(#ey)"/>
  <ellipse cx="245" cy="212" rx="12" ry="13" fill="#2a1510"/>
  <circle  cx="255" cy="204" r="7"  fill="white"/>
  <circle  cx="239" cy="216" r="3"  fill="white" opacity="0.5"/>
  <path d="M219 200 Q244 188 270 200" stroke="#8b5e3c" stroke-width="2.5" fill="none" stroke-linecap="round"/>

