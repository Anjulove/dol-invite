  </defs>

  <rect width="400" height="500" fill="url(#bg)"/>

  <!-- 장식 -->
  <circle cx="38"  cy="50"  r="5" fill="#b8edcc" opacity="0.6"/>
  <circle cx="362" cy="72"  r="6" fill="#f9c6cb" opacity="0.5"/>
  <circle cx="20"  cy="200" r="4" fill="#b8edcc" opacity="0.4"/>
