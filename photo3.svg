  <path d="M133 184 Q156 173 178 180" stroke="#8b5e3c" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M222 180 Q244 173 267 184" stroke="#8b5e3c" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- 코 -->
  <ellipse cx="200" cy="253" rx="11" ry="7" fill="#e8a080" opacity="0.3"/>

