  <path d="M85 178 Q89 96 200 88 Q311 96 315 178 Q283 128 200 124 Q117 128 85 178Z" fill="#8b5e3c"/>
  <ellipse cx="172" cy="100" rx="18" ry="13" fill="#7a5030"/>
  <ellipse cx="228" cy="100" rx="18" ry="13" fill="#7a5030"/>

