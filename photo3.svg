  <path d="M176 280 Q200 300 224 280 Q200 295 176 280Z" fill="#f09090" opacity="0.35"/>
  <path d="M182 280 Q200 295 218 280" fill="white" opacity="0.4"/>

  <!-- 손 (케이크 양쪽에 올려둔 느낌) -->
  <ellipse cx="118" cy="338" rx="22" ry="16" fill="#f0c09a" transform="rotate(-20 118 338)"/>
  <ellipse cx="282" cy="338" rx="22" ry="16" fill="#f0c09a" transform="rotate(20 282 338)"/>

  <text x="200" y="492" text-anchor="middle" font-family="serif" font-size="14" fill="#2a9060" opacity="0.85">🎂 두 손 가득 행복해라 🎂</text>
