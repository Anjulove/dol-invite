  <rect x="110" y="395" width="180" height="70" rx="14" fill="url(#cake1)"/>
  <rect x="130" y="345" width="140" height="58" rx="12" fill="url(#cake2)"/>
  <!-- 크림 장식 -->
  <ellipse cx="200" cy="395" rx="90" ry="12" fill="white" opacity="0.7"/>
  <ellipse cx="200" cy="345" rx="70" ry="10" fill="white" opacity="0.7"/>
  <!-- 케이크 무늬 -->
  <circle cx="155" cy="425" r="5" fill="#f9c6cb" opacity="0.8"/>
  <circle cx="200" cy="430" r="5" fill="#b8edcc" opacity="0.8"/>
  <circle cx="245" cy="425" r="5" fill="#fde8a0" opacity="0.8"/>
  <circle cx="165" cy="378" r="4" fill="#f9c6cb" opacity="0.8"/>
  <circle cx="235" cy="378" r="4" fill="#fde8a0" opacity="0.8"/>
  <!-- 케이크 숫자 1 -->
  <text x="200" y="385" text-anchor="middle" font-family="serif" font-size="22" font-weight="bold" fill="#d4707a">1</text>
